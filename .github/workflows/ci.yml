name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package and test deps
        run: |
          python -m pip install --upgrade pip
          pip install ruff
          pip install .[test]

      - name: Lint
        run: ruff check pymadoka tests

      - name: Test
        run: python -m pytest tests/ -v
