name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package and test deps
        run: |
          python -m pip install --upgrade pip
          pip install ruff
          pip install .[test]

      - name: Lint
        run: ruff check pymadoka tests

      - name: Test
        # Autoload disabled so the plugin set is hermetic and identical to
        # local dev runs: pyproject's addopts loads pytest_asyncio.plugin
        # explicitly, and autoloading it a second time via its entry point
        # fails with "Plugin already registered under a different name".
        env:
          PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
        run: python -m pytest tests/ -v
